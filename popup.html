<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      background-color: #ffffff;
      color: #333333;
    }
    h1 {
      font-size: 20px;
      margin-top: 0;
      margin-bottom: 8px;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .emoji {
      font-size: 24px;
    }
    p {
      font-size: 14px;
      line-height: 1.4;
      margin-top: 0;
      color: #666;
      margin-bottom: 16px;
    }
    .instruction-box {
      background-color: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .instruction-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 10px;
      color: #212529;
    }
    .instruction-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 10px;
      font-size: 13px;
    }
    .instruction-item:last-child {
      margin-bottom: 0;
    }
    .step-num {
      background-color: #007bff;
      color: white;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 10px;
      flex-shrink: 0;
      margin-top: 0;
    }
    .kbd {
      background-color: #e9ecef;
      border: 1px solid #ced4da;
      border-radius: 4px;
      padding: 2px 5px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: #495057;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      box-sizing: border-box;
      transition: background-color 0.2s;
    }
    .btn:hover {
      background-color: #0056b3;
    }
    .or-divider {
      text-align: center;
      margin: 8px 0;
      color: #adb5bd;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1><span class="emoji">🪄</span> AuraLens</h1>
  <p>Your AI assistant for rich, accessible image descriptions.</p>
  
  <div class="instruction-box">
    <div class="instruction-title">How to use:</div>
    
    <div class="instruction-item">
      <div class="step-num">1</div>
      <div><strong>Right-click</strong> any image and select <br><em>"🪄 AuraLens: Describe Image"</em></div>
    </div>
    
    <div class="or-divider">or</div>
    
    <div class="instruction-item">
      <div class="step-num">2</div>
      <div><strong>Hover</strong> your mouse over an image and press <span class="kbd">Ctrl</span> + <span class="kbd">Shift</span> + <span class="kbd">U</span></div>
    </div>
  </div>

  <button id="optionsBtn" class="btn"><span>⚙️</span> Configure API Key</button>

  <script src="popup.js"></script>
</body>
</html>
